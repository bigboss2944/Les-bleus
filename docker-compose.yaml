services:
  AspNet_FilRouge:
    build:
      context: ./AspNet_FilRouge
      dockerfile: Dockerfile
    # Raspberry Pi 3 = ARMv7 32-bit
    platform: linux/arm/v7
    ports:
      - "5100:5100"
    environment:
      ASPNETCORE_URLS: "http://0.0.0.0:5100"
    restart: unless-stopped
  AspNet_FilRouge_Vendeur:
    build:
      context: ./AspNet_FilRouge_Vendeur
      dockerfile: Dockerfile
    # Raspberry Pi 3 = ARMv7 32-bit
    platform: linux/arm/v7
    ports:
      - "5101:5101"
    environment:
      ASPNETCORE_URLS: "http://0.0.0.0:5101"
    restart: unless-stopped  
