name: .NET 10 Build and Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore FilRouge.sln

    - name: Build
      run: dotnet build FilRouge.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test FilRouge.sln --no-build --configuration Release --verbosity normal
